common:
  msg_source: 1
  send_packet_ros: false
  send_point_cloud_ros: true

lidar:
  - driver:
      lidar_type: RSM1
      msop_port: 6688
      difop_port: 7799
      imu_port: 0
      user_layer_bytes: 0
      tail_layer_bytes: 0
      min_distance: 0.2
      max_distance: 200
      use_lidar_clock: false
      dense_points: false
      ts_first_point: true
      start_angle: 0
      end_angle: 360
      pcap_repeat: true
      pcap_rate: 1.0
      # For PCAP playback, set a path relative to this config file.
      # This is unused while msg_source is 1 (online LiDAR input).
      pcap_path: ""
    ros:
      ros_frame_id: rslidar
      ros_recv_packet_topic: /rslidar_packets
      ros_send_packet_topic: /rslidar_packets
      ros_send_imu_data_topic: /rslidar_imu_data
      ros_send_point_cloud_topic: /rslidar_points
      ros_queue_length: 100
